<div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
    <h3 class="text-lg font-bold text-slate-900">Edit Category</h3>
    <button @click="modalOpen = false" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="bi bi-x-lg"></i>
    </button>
</div>

<form hx-put="/hx/categories" hx-target="#modal-messages" hx-swap="innerHTML" class="p-6 space-y-4">
    <div id="modal-messages"></div>
    <input type="hidden" name="id" value="$id$">
    
    <div>
        <label for="name" class="block text-sm font-medium text-slate-700 mb-1">
            Category Name <span class="text-rose-500">*</span>
        </label>
        <input type="text" id="name" name="name" value="$category_name$" required
               class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
    </div>
    
    <div class="pt-4 flex gap-3">
        <button type="submit" 
                class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded-lg transition-colors shadow-sm">
            Update Category
        </button>
        <button type="button" @click="modalOpen = false"
                class="flex-1 bg-white border border-slate-200 text-slate-700 font-medium py-2 rounded-lg hover:bg-slate-50 transition-colors">
            Cancel
        </button>
    </div>
</form>
