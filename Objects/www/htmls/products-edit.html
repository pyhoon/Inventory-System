<div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
    <h3 class="text-lg font-bold text-slate-900">Edit Product</h3>
    <button @click="modalOpen = false" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="bi bi-x-lg"></i>
    </button>
</div>

<form hx-put="/hx/products" hx-target="#modal-messages" hx-swap="innerHTML" class="p-6 space-y-4">
    <div id="modal-messages"></div>
    <input type="hidden" name="id" value="$id$">
    
    <div>
        <label for="category2" class="block text-sm font-medium text-slate-700 mb-1">
            Category <span class="text-rose-500">*</span>
        </label>
        <div class="relative">
            <select class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all appearance-none" id="category2" name="category" required></select>
            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                <i class="bi bi-chevron-down text-slate-400 text-xs"></i>
            </div>
        </div>
    </div>
    
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
            Product Code <span class="text-rose-500">*</span>
        </label>
        <input type="text" name="code" value="$code$" required
               class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
    </div>
    
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
            Product Name <span class="text-rose-500">*</span>
        </label>
        <input type="text" name="name" value="$name$" required
               class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
    </div>
    
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
            Price
        </label>
        <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">$</span>
            <input type="text" name="price" value="$price$"
                   class="w-full pl-8 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
        </div>
    </div>
    
    <div class="pt-4 flex gap-3">
        <button type="submit" 
                class="flex-1 bg-sky-600 hover:bg-sky-700 text-white font-medium py-2 rounded-lg transition-colors shadow-sm">
            Update Product
        </button>
        <button type="button" @click="modalOpen = false"
                class="flex-1 bg-white border border-slate-200 text-slate-700 font-medium py-2 rounded-lg hover:bg-slate-50 transition-colors">
            Cancel
        </button>
    </div>
</form>
