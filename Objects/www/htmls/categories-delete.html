<div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
    <h3 class="text-lg font-bold text-slate-900">Delete Category</h3>
    <button @click="modalOpen = false" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="bi bi-x-lg"></i>
    </button>
</div>

<form hx-delete="/hx/categories" hx-target="#modal-messages" hx-swap="innerHTML" class="p-6 space-y-4">
    <div id="modal-messages"></div>
    <input type="hidden" name="id" value="$id$">
    
    <div class="text-center py-4">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-rose-100 text-rose-600 rounded-full mb-4">
            <i class="bi bi-exclamation-triangle h2 mb-0"></i>
        </div>
        <p class="text-slate-600">Are you sure you want to delete this category?</p>
        <p class="text-lg font-bold text-slate-900 mt-2">$category_name$</p>
    </div>
    
    <div class="pt-4 flex gap-3">
        <button type="submit" 
                class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-medium py-2 rounded-lg transition-colors shadow-sm">
            Delete Category
        </button>
        <button type="button" @click="modalOpen = false"
                class="flex-1 bg-white border border-slate-200 text-slate-700 font-medium py-2 rounded-lg hover:bg-slate-50 transition-colors">
            Cancel
        </button>
    </div>
</form>
